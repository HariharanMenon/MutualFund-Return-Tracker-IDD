# render.yaml — Render deployment specification
# Deploys:
#   1. Backend  — Python FastAPI web service
#   2. Frontend — React + Vite static site
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─────────────────────────────────────────────────────────────────
  # 1. Backend — FastAPI web service
  # ─────────────────────────────────────────────────────────────────
  - type: web
    name: mf-xirr-tracker-backend
    runtime: python
    region: singapore           # closest region for Indian users
    plan: free

    # Root of the repository is the build context; Render's working
    # directory for install/start commands is set by rootDir.
    rootDir: backend

    buildCommand: pip install -r requirements.txt

    # Procfile value; $PORT is injected by Render at runtime.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Health check — Render pings this to detect successful startup.
    healthCheckPath: /health

    envVars:
      # Tells FastAPI we are running in production (disables debug mode).
      - key: ENVIRONMENT
        value: production

      # Python runtime matching backend/runtime.txt
      - key: PYTHON_VERSION
        value: "3.11.7"

  # ─────────────────────────────────────────────────────────────────
  # 2. Frontend — Vite static site
  # ─────────────────────────────────────────────────────────────────
  - type: web
    name: mf-xirr-tracker-frontend
    runtime: static
    region: singapore

    rootDir: frontend

    buildCommand: npm install && npm run build

    # Vite outputs to dist/ by default (see vite.config.js).
    staticPublishPath: dist

    # SPA routing: serve index.html for any unknown path so React
    # Router (if added later) handles client-side navigation.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # Point the frontend at the deployed backend URL.
      # Replace the placeholder value after the backend service is
      # first deployed and its URL is known.
      - key: VITE_API_URL
        value: https://mf-xirr-tracker-backend.onrender.com
